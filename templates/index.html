<!DOCTYPE html>
<html lang="id">
<head>
    <title>Data Produk</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #FFF8F0;
            color: #2d3436;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* ---- HEADER ---- */
        .hero {
            background: #FF6B6B;
            border-radius: 16px;
            padding: 1.5rem 1.75rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .hero-icon {
            width: 52px;
            height: 52px;
            background: #FFE66D;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }

        .hero h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #4A1B0C;
        }

        .hero p {
            font-size: 0.85rem;
            color: #712B13;
            margin-top: 2px;
        }

        /* ---- CARD ---- */
        .card {
            background: #ffffff;
            border-radius: 16px;
            border: 1.5px solid #FFE0D0;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        /* ---- FORM ---- */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #636e72;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .form-group input {
            padding: 10px 14px;
            border: 1.5px solid #FFD0B5;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            color: #2d3436;
            background: #FFF8F0;
            transition: border-color 0.2s, background 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #FF6B6B;
            background: #fff;
        }

        .btn-tambah {
            padding: 10px 22px;
            background: #FF6B6B;
            color: #4A1B0C;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            white-space: nowrap;
            height: 42px;
        }

        .btn-tambah:hover  { background: #ff5252; }
        .btn-tambah:active { transform: scale(0.97); }

        /* ---- NOTIFIKASI ---- */
        .notif {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            animation: fadeIn 0.2s ease;
        }

        .notif.sukses { display: flex; background: #EAF3DE; color: #3B6D11; }
        .notif.error  { display: flex; background: #FCEBEB; color: #A32D2D; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

        /* ---- TABEL ---- */
        .table-wrap {
            overflow-x: auto;
        }

        .badge-count {
            font-size: 0.75rem;
            background: #E1F5EE;
            color: #0F6E56;
            padding: 2px 10px;
            border-radius: 999px;
            font-weight: 600;
            margin-left: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
            table-layout: fixed;
        }

        th {
            padding: 10px 16px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            color: #636e72;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #FFF3E8;
            border-bottom: 1.5px solid #FFD0B5;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #FFE8D8;
            color: #2d3436;
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td { background: #FFF8F0; }

        .id-pill {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            background: #FAEEDA;
            color: #633806;
            padding: 3px 10px;
            border-radius: 999px;
            font-weight: 700;
        }

        .harga-text {
            font-weight: 700;
            color: #185FA5;
        }

        .action-cell {
            display: flex;
            gap: 6px;
        }

        .btn-edit {
            padding: 5px 14px;
            background: #FFE66D;
            color: #412402;
            border: 1.5px solid #EF9F27;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-edit:hover { background: #FAC775; }

        .btn-hapus {
            padding: 5px 12px;
            background: #FCEBEB;
            color: #A32D2D;
            border: 1.5px solid #F09595;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-hapus:hover { background: #F7C1C1; }

        .empty-state {
            text-align: center;
            color: #b2bec3;
            padding: 2.5rem;
            font-size: 0.9rem;
        }

        @media (max-width: 560px) {
            .form-row { grid-template-columns: 1fr; }
            .btn-tambah { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- HEADER -->
    <div class="hero">
        <div class="hero-icon">🛍️</div>
        <div>
            <h1>Data Produk Toko Paii's</h1>
            <p>Pengelolaan stok barang</p>
        </div>
    </div>

    <!-- FORM TAMBAH -->
    <div class="card">
        <div class="card-title">
            <span class="dot" style="background:#FF6B6B"></span>
            Tambah Produk
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Nama Produk</label>
                <input type="text" id="nama" placeholder="cth: Kaos Polos" />
            </div>
            <div class="form-group">
                <label>Harga (Rp)</label>
                <input type="number" id="harga" placeholder="85000" />
            </div>
            <button class="btn-tambah" onclick="tambahProduk()">+ Tambah</button>
        </div>
    </div>

    <!-- NOTIFIKASI -->
    <div class="notif" id="notif"></div>

    <!-- TABEL -->
    <div class="card">
        <div class="card-title">
            <span class="dot" style="background:#4ECDC4"></span>
            Daftar Produk
            <span class="badge-count" id="badge-count">0 item</span>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:70px">ID</th>
                        <th>Nama</th>
                        <th style="width:140px">Harga</th>
                        <th style="width:130px">Aksi</th>
                    </tr>
                </thead>
                <tbody id="data-produk">
                    <tr>
                        <td colspan="4" class="empty-state">Memuat data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    function formatRupiah(angka) {
        return 'Rp ' + Math.round(angka).toLocaleString('id-ID');
    }

    function tampilNotif(pesan, tipe) {
        const el = document.getElementById('notif');
        el.textContent = (tipe === 'sukses' ? '✅ ' : '❌ ') + pesan;
        el.className = 'notif ' + tipe;
        clearTimeout(el._timer);
        el._timer = setTimeout(() => { el.className = 'notif'; }, 3000);
    }

    function tampilkanProduk() {
        fetch('/api/produk')
        .then(response => response.json())
        .then(data => {

            let tabel = document.getElementById('data-produk');
            let badge = document.getElementById('badge-count');

            badge.textContent = data.length + ' item';

            if (data.length === 0) {
                tabel.innerHTML = '<tr><td colspan="4" class="empty-state">Belum ada produk. Tambah produk dulu yuk!</td></tr>';
                return;
            }

            tabel.innerHTML = '';

            data.forEach(produk => {
                tabel.innerHTML += `
                    <tr>
                        <td><span class="id-pill">#${produk.id}</span></td>
                        <td>${produk.nama}</td>
                        <td><span class="harga-text">${formatRupiah(produk.harga)}</span></td>
                        <td>
                            <div class="action-cell">
                                <button class="btn-edit" onclick="editProduk(${produk.id}, '${produk.nama}', ${produk.harga})">
                                    ✏️ Edit
                                </button>
                                <button class="btn-hapus" onclick="hapusProduk(${produk.id})">
                                    🗑
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });

        });
    }

    function tambahProduk() {

        let nama  = document.getElementById('nama').value;
        let harga = document.getElementById('harga').value;

        fetch('/api/produk', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                nama: nama,
                harga: parseInt(harga)
            })

        })
        .then(response => response.json())
        .then(data => {
            tampilNotif(data.message, 'sukses');
            document.getElementById('nama').value  = '';
            document.getElementById('harga').value = '';
            tampilkanProduk();
        });
    }

    function editProduk(id, namaLama, hargaLama) {

        let namaBaru  = prompt("Masukkan nama baru:", namaLama);
        let hargaBaru = prompt("Masukkan harga baru:", hargaLama);

        fetch('/api/produk/' + id, {

            method: 'PUT',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                nama:  namaBaru,
                harga: parseInt(hargaBaru)
            })

        })
        .then(response => response.json())
        .then(data => {
            tampilNotif(data.message, 'sukses');
            tampilkanProduk();
        });
    }

    function hapusProduk(id) {

        fetch('/api/produk/' + id, {
            method: 'DELETE'
        })
        .then(response => response.json())
        .then(data => {
            tampilNotif(data.message, 'sukses');
            tampilkanProduk();
        });
    }

    tampilkanProduk();
</script>

</body>
</html>
